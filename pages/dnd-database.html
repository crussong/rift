<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>D&amp;D Datenbank — RIFT</title>
<link rel="icon" href="/assets/img/favicon.ico"/>
<link rel="stylesheet" href="/assets/css/core.css"/>
<link rel="stylesheet" href="/assets/css/topbar.css"/>
<link rel="stylesheet" href="/assets/css/dock.css"/>
<link rel="stylesheet" href="/assets/css/footer.css"/>
<link rel="stylesheet" href="/assets/css/dnd-item-card.css"/>
<style>
:root {
  --ddb-accent: #FF4655;
  --ddb-bg: #161616;
  --ddb-surface: #1e1e1e;
  --ddb-card: #242428;
  --ddb-border: rgba(255,255,255,0.07);
  --ddb-text: #e8e8e8;
  --ddb-muted: rgba(255,255,255,0.38);
}

.ddb-page {
  min-height: 100vh;
  background: var(--ddb-bg);
  color: var(--ddb-text);
  font-family: 'Inter', sans-serif;
  padding-top: 60px; /* TopNav height */
  padding-bottom: 72px; /* Dock height */
}

/* ── Top controls ── */
.ddb-controls {
  position: sticky;
  top: 60px;
  z-index: 100;
  background: rgba(22,22,22,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--ddb-border);
  padding: 12px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.ddb-search-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.ddb-search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ddb-muted);
  pointer-events: none;
  display: flex;
}
.ddb-search-icon svg { width: 15px; height: 15px; }
.ddb-search {
  width: 100%;
  padding: 9px 12px 9px 36px;
  background: var(--ddb-surface);
  border: 1px solid var(--ddb-border);
  border-radius: 8px;
  color: var(--ddb-text);
  font-size: 13px;
  font-family: inherit;
  box-sizing: border-box;
  transition: border-color 0.15s;
}
.ddb-search:focus { outline: none; border-color: rgba(255,70,85,0.4); }
.ddb-search::placeholder { color: var(--ddb-muted); }

/* Category tabs */
.ddb-tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.ddb-tab {
  padding: 7px 14px;
  border-radius: 7px;
  border: 1px solid var(--ddb-border);
  background: transparent;
  color: var(--ddb-muted);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  white-space: nowrap;
}
.ddb-tab:hover { background: rgba(255,255,255,0.06); color: var(--ddb-text); }
.ddb-tab.active {
  background: rgba(255,70,85,0.15);
  color: #FF4655;
  border-color: rgba(255,70,85,0.3);
}

/* Count badge */
.ddb-count {
  font-size: 11px;
  color: var(--ddb-muted);
  white-space: nowrap;
  padding: 7px 0;
}

/* ── Grid ── */
.ddb-grid-wrap {
  padding: 16px 20px;
}
.ddb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}

/* ── Item tile ── */
.ddb-tile {
  background: var(--ddb-card);
  border: 1px solid var(--ddb-border);
  border-radius: 10px;
  padding: 12px;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.1s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
  position: relative;
}
.ddb-tile:hover {
  background: #2a2a30;
  border-color: rgba(255,70,85,0.25);
  transform: translateY(-1px);
}
.ddb-tile:active { transform: translateY(0); }

.ddb-tile__icon {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  overflow: hidden;
  flex-shrink: 0;
}
.ddb-tile__icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 4px;
  box-sizing: border-box;
}

.ddb-tile__content { flex: 1; min-width: 0; }
.ddb-tile__name {
  font-size: 12px;
  font-weight: 600;
  color: var(--ddb-text);
  line-height: 1.3;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  margin: 0 0 4px;
}
.ddb-tile__name-de {
  font-size: 10px;
  color: var(--ddb-muted);
  margin: 0;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-style: italic;
}
.ddb-tile__sub {
  font-size: 10px;
  color: rgba(255,255,255,0.28);
  margin: 0;
}
.ddb-tile__tag {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-top: 4px;
}
.ddb-tile__tag--spell    { background: rgba(120,80,220,0.18); color: #a78bfa; }
.ddb-tile__tag--weapon   { background: rgba(255,70,85,0.12); color: #ff8a95; }
.ddb-tile__tag--armor    { background: rgba(56,189,248,0.1); color: #7dd3fc; }
.ddb-tile__tag--equip    { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); }
.ddb-tile__tag--magic    { background: rgba(245,158,11,0.12); color: #fcd34d; }
.ddb-tile__tag--common   { background: rgba(156,163,175,0.08); color: #9ca3af; }
.ddb-tile__tag--uncommon { background: rgba(34,197,94,0.08); color: #4ade80; }
.ddb-tile__tag--rare     { background: rgba(59,130,246,0.1); color: #93c5fd; }
.ddb-tile__tag--epic     { background: rgba(168,85,247,0.1); color: #d8b4fe; }
.ddb-tile__tag--legendary{ background: rgba(245,158,11,0.12); color: #fcd34d; }

/* Level badge on tile icon */
.ddb-tile__level {
  position: absolute;
  bottom: -2px;
  right: -2px;
  background: #FF4655;
  color: white;
  font-size: 8px;
  font-weight: 800;
  padding: 2px 4px;
  border-radius: 4px;
  line-height: 1;
}

/* Empty state */
.ddb-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--ddb-muted);
  font-size: 13px;
}
.ddb-empty svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.3; display: block; margin-inline: auto; }

/* Loading */
.ddb-loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--ddb-muted);
  font-size: 13px;
}
.ddb-spinner {
  width: 28px; height: 28px;
  border: 2px solid rgba(255,70,85,0.2);
  border-top-color: #FF4655;
  border-radius: 50%;
  animation: ddb-spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes ddb-spin { to { transform: rotate(360deg); } }

/* Rarity border on tile */
.ddb-tile[data-rarity="uncommon"] { border-left: 2px solid #4ade80; }
.ddb-tile[data-rarity="rare"]     { border-left: 2px solid #93c5fd; }
.ddb-tile[data-rarity="epic"]     { border-left: 2px solid #d8b4fe; }
.ddb-tile[data-rarity="legendary"]{ border-left: 2px solid #fcd34d; }

/* Pagination */
.ddb-pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 16px 20px 24px;
  flex-wrap: wrap;
}
.ddb-page-btn {
  padding: 6px 14px;
  border-radius: 7px;
  border: 1px solid var(--ddb-border);
  background: transparent;
  color: var(--ddb-muted);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.ddb-page-btn:hover { background: rgba(255,255,255,0.06); color: var(--ddb-text); }
.ddb-page-btn.active { background: rgba(255,70,85,0.15); color: #FF4655; border-color: rgba(255,70,85,0.3); }
.ddb-page-btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body class="dark">

<div class="ddb-page" id="ddbPage">

  <div class="ddb-controls">
    <div class="ddb-search-wrap">
      <span class="ddb-search-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="7" cy="7" r="4.5"/>
          <line x1="10.5" y1="10.5" x2="14" y2="14"/>
        </svg>
      </span>
      <input class="ddb-search" type="text" id="ddbSearch" placeholder="Suchen — Zauber, Waffe, Item..." autocomplete="off"/>
    </div>
    <div class="ddb-tabs" id="ddbTabs">
      <button class="ddb-tab active" data-type="spells">Zauber</button>
      <button class="ddb-tab" data-type="weapons">Waffen</button>
      <button class="ddb-tab" data-type="armor">Rüstungen</button>
      <button class="ddb-tab" data-type="equipment">Ausrüstung</button>
      <button class="ddb-tab" data-type="magic_items">Mag. Items</button>
    </div>
    <span class="ddb-count" id="ddbCount"></span>
  </div>

  <div class="ddb-grid-wrap">
    <div class="ddb-loading" id="ddbLoading">
      <div class="ddb-spinner"></div>
      Datenbank wird geladen…
    </div>
    <div class="ddb-grid" id="ddbGrid" style="display:none"></div>
  </div>

  <div class="ddb-pagination" id="ddbPagination"></div>

</div>

<script src="/assets/js/firebase-config.js"></script>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/layout-unified.js"></script>
<script src="/assets/js/dnd-item-card.js"></script>
<script>
// ── RIFT D&D Database Browser ────────────────────────────────────────────────
(function() {
  'use strict';

  const PAGE_SIZE = 48;

  let db = null;
  let currentType = 'spells';
  let currentQuery = '';
  let currentPage = 0;
  let filteredItems = [];

  const elLoading    = document.getElementById('ddbLoading');
  const elGrid       = document.getElementById('ddbGrid');
  const elCount      = document.getElementById('ddbCount');
  const elSearch     = document.getElementById('ddbSearch');
  const elTabs       = document.getElementById('ddbTabs');
  const elPagination = document.getElementById('ddbPagination');

  // ── Load database ──────────────────────────────────────────────────────────
  async function loadDb() {
    try {
      const res = await fetch('/assets/data/rift_dnd_database.json');
      db = await res.json();
      RiftItemCard.setDb(db);
      elLoading.style.display = 'none';
      elGrid.style.display = 'grid';
      refresh();
    } catch(e) {
      elLoading.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>Fehler beim Laden der Datenbank`;
    }
  }

  // ── Filter & render ────────────────────────────────────────────────────────
  function refresh() {
    if (!db) return;
    const section = db[currentType] || {};
    const query = currentQuery.toLowerCase().trim();
    const entries = Object.entries(section);

    filteredItems = query
      ? entries.filter(([idx, entry]) => {
          const name    = (entry.name || '').toLowerCase();
          const nameDe  = (entry.name_de || '').toLowerCase();
          const school  = (entry.school || '').toLowerCase();
          const dmg     = (entry.damage_type || '').toLowerCase();
          const cat     = (entry.category || '').toLowerCase();
          const rarity  = (entry.rarity_en || '').toLowerCase();
          return name.includes(query) || nameDe.includes(query) || school.includes(query)
              || dmg.includes(query)  || cat.includes(query)    || rarity.includes(query)
              || idx.includes(query);
        })
      : entries;

    currentPage = 0;
    elCount.textContent = `${filteredItems.length} Einträge`;
    renderPage();
  }

  function renderPage() {
    const start = currentPage * PAGE_SIZE;
    const page  = filteredItems.slice(start, start + PAGE_SIZE);

    if (filteredItems.length === 0) {
      elGrid.innerHTML = `
        <div class="ddb-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
          Keine Ergebnisse für „${currentQuery}"
        </div>`;
      elPagination.innerHTML = '';
      return;
    }

    elGrid.innerHTML = page.map(([idx, entry]) => buildTile(idx, entry)).join('');

    // Click handlers
    elGrid.querySelectorAll('.ddb-tile').forEach(tile => {
      tile.addEventListener('click', () => {
        RiftItemCard.show(currentType, tile.dataset.index);
      });
    });

    renderPagination();
  }

  function buildTile(idx, entry) {
    const type = currentType;
    const name   = entry.name || idx;
    const nameDe = (entry.name_de && entry.name_de !== name) ? entry.name_de : '';
    const icon   = entry.icon_url || '';
    const rarity = entry.rarity || '';

    let tagHtml = '';
    let subHtml = '';
    let levelBadge = '';

    if (type === 'spells') {
      const level = entry.level;
      const levelText = level === 0 ? 'Zaubertrick' : `Grad ${level}`;
      subHtml = `<p class="ddb-tile__sub">${entry.school || ''}</p>`;
      tagHtml = `<span class="ddb-tile__tag ddb-tile__tag--spell">${levelText}</span>`;
      levelBadge = `<span class="ddb-tile__level">${level === 0 ? 'C' : level}</span>`;
    } else if (type === 'weapons') {
      const cat = entry.category || '';
      const dmg = entry.damage || '';
      subHtml = `<p class="ddb-tile__sub">${dmg}</p>`;
      tagHtml = `<span class="ddb-tile__tag ddb-tile__tag--weapon">${cat}</span>`;
    } else if (type === 'armor') {
      subHtml = `<p class="ddb-tile__sub">RK ${entry.ac || ''}</p>`;
      tagHtml = `<span class="ddb-tile__tag ddb-tile__tag--armor">${entry.category || ''}</span>`;
    } else if (type === 'equipment') {
      subHtml = `<p class="ddb-tile__sub">${entry.cost || ''}</p>`;
      tagHtml = `<span class="ddb-tile__tag ddb-tile__tag--equip">${entry.category || 'item'}</span>`;
    } else if (type === 'magic_items') {
      subHtml = '';
      const rcls = rarity || 'common';
      tagHtml = `<span class="ddb-tile__tag ddb-tile__tag--${rcls}">${entry.rarity_en || rarity}</span>`;
    }

    return `
      <div class="ddb-tile" data-index="${idx}" ${rarity ? `data-rarity="${rarity}"` : ''}>
        <div style="display:flex;gap:10px;align-items:flex-start">
          <div class="ddb-tile__icon" style="position:relative">
            ${icon ? `<img src="${icon}" alt="${name}" loading="lazy"/>` : ''}
            ${levelBadge}
          </div>
          <div class="ddb-tile__content">
            <p class="ddb-tile__name">${name}</p>
            ${nameDe ? `<p class="ddb-tile__name-de">${nameDe}</p>` : ''}
            ${subHtml}
            ${tagHtml}
          </div>
        </div>
      </div>`;
  }

  function renderPagination() {
    const total = Math.ceil(filteredItems.length / PAGE_SIZE);
    if (total <= 1) { elPagination.innerHTML = ''; return; }

    let html = `<button class="ddb-page-btn" id="ddbPrev" ${currentPage === 0 ? 'disabled' : ''}>‹ Zurück</button>`;

    // Show max 7 page buttons
    const range = 3;
    for (let i = 0; i < total; i++) {
      if (i === 0 || i === total - 1 || Math.abs(i - currentPage) <= range) {
        html += `<button class="ddb-page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i + 1}</button>`;
      } else if (Math.abs(i - currentPage) === range + 1) {
        html += `<span style="color:rgba(255,255,255,0.2);padding:6px 4px">…</span>`;
      }
    }
    html += `<button class="ddb-page-btn" id="ddbNext" ${currentPage >= total - 1 ? 'disabled' : ''}>Weiter ›</button>`;

    elPagination.innerHTML = html;
    elPagination.querySelector('#ddbPrev')?.addEventListener('click', () => { currentPage--; renderPage(); scrollToGrid(); });
    elPagination.querySelector('#ddbNext')?.addEventListener('click', () => { currentPage++; renderPage(); scrollToGrid(); });
    elPagination.querySelectorAll('[data-page]').forEach(btn => {
      btn.addEventListener('click', () => { currentPage = +btn.dataset.page; renderPage(); scrollToGrid(); });
    });
  }

  function scrollToGrid() {
    elGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  elSearch.addEventListener('input', () => {
    currentQuery = elSearch.value;
    refresh();
  });

  elTabs.querySelectorAll('.ddb-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      elTabs.querySelectorAll('.ddb-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentType = tab.dataset.type;
      currentQuery = '';
      elSearch.value = '';
      refresh();
    });
  });

  // Roll event → forward to RIFT dice module if available
  document.addEventListener('rift-ic-roll', e => {
    const { formula, label } = e.detail;
    if (window.RiftDice?.roll) {
      window.RiftDice.roll(formula, label);
    } else if (window.riftRollDice) {
      window.riftRollDice(formula, label);
    }
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  loadDb();

})();
</script>

</body>
</html>
