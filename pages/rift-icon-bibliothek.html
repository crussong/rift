<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIFT — Icon Bibliothek</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Exo+2:wght@300;400;500;600&display=swap');

  :root {
    --bg:     #0e0e12;
    --bg2:    #13131a;
    --bg3:    #1a1a24;
    --card:   #1e1e2a;
    --border: rgba(255,255,255,.06);
    --gold:   #d4a844;
    --gold2:  #f0c060;
    --tx:     #e8e8f0;
    --t2:     rgba(232,232,240,.6);
    --t3:     rgba(232,232,240,.35);
    --red:    #d04040;
    --blu:    #4090e0;
    --grn:    #40b060;
    --purp:   #9060d0;
    --spell-col: #9060d0;
    --armor-col: #4090e0;
    --weapon-col:#c04040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--tx);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, #0a0a0f 0%, var(--bg2) 100%);
    border-bottom: 1px solid rgba(212,168,68,.2);
    padding: 20px 32px 16px;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1600px; margin: 0 auto;
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }
  .logo {
    font-family: 'Cinzel', serif;
    font-size: 22px; font-weight: 700;
    color: var(--gold);
    letter-spacing: .12em;
    text-shadow: 0 0 20px rgba(212,168,68,.3);
    white-space: nowrap;
  }
  .logo span { color: var(--t3); font-weight: 400; font-size: 14px; letter-spacing: .05em; margin-left: 8px; }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 4px;
    background: rgba(0,0,0,.3);
    border-radius: 10px; padding: 4px;
    border: 1px solid var(--border);
  }
  .tab {
    padding: 7px 18px; border-radius: 7px;
    font-size: 13px; font-weight: 600; letter-spacing: .04em;
    cursor: pointer; transition: all .18s;
    color: var(--t2); border: none; background: none;
  }
  .tab.active { color: #fff; }
  .tab[data-cat="spells"].active  { background: rgba(144,96,208,.25); box-shadow: 0 0 12px rgba(144,96,208,.2); color: #c090ff; }
  .tab[data-cat="armor"].active   { background: rgba(64,144,224,.25); box-shadow: 0 0 12px rgba(64,144,224,.2); color: #80c0ff; }
  .tab[data-cat="weapons"].active { background: rgba(192,64,64,.25);  box-shadow: 0 0 12px rgba(192,64,64,.2);  color: #ff8080; }
  .tab:not(.active):hover { color: var(--tx); background: rgba(255,255,255,.05); }

  /* ── SEARCH ── */
  .search-wrap { flex: 1; min-width: 200px; max-width: 320px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .4; pointer-events: none; }
  #search {
    width: 100%; background: rgba(0,0,0,.4);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px 8px 36px;
    color: var(--tx); font-family: 'Exo 2', sans-serif; font-size: 13px;
    outline: none; transition: border-color .15s;
  }
  #search:focus { border-color: rgba(212,168,68,.35); }
  #search::placeholder { color: var(--t3); }

  /* ── STATS BAR ── */
  .stats-bar {
    max-width: 1600px; margin: 16px auto 0;
    padding: 0 32px;
    display: flex; gap: 20px; align-items: center;
    font-size: 12px; color: var(--t3);
  }
  .stat-num { color: var(--gold); font-weight: 600; font-size: 14px; }
  .stats-bar .sep { width: 1px; height: 14px; background: var(--border); }

  /* ── MAIN GRID ── */
  main { max-width: 1600px; margin: 0 auto; padding: 20px 32px 40px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 8px;
  }

  /* ── ICON CARD ── */
  .icon-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 6px 7px;
    cursor: pointer;
    transition: all .15s;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    position: relative;
    overflow: hidden;
  }
  .icon-card::before {
    content: ''; position: absolute; inset: 0;
    background: var(--card-glow, transparent);
    opacity: 0; transition: opacity .15s; border-radius: 10px;
  }
  .icon-card:hover { border-color: rgba(255,255,255,.15); transform: translateY(-2px); }
  .icon-card:hover::before { opacity: 1; }
  .icon-card.selected { border-color: var(--gold) !important; background: rgba(212,168,68,.08); }

  .cat-spells  .icon-card { --card-glow: radial-gradient(circle at 50% 50%, rgba(144,96,208,.12), transparent 70%); }
  .cat-armor   .icon-card { --card-glow: radial-gradient(circle at 50% 50%, rgba(64,144,224,.12), transparent 70%); }
  .cat-weapons .icon-card { --card-glow: radial-gradient(circle at 50% 50%, rgba(192,64,64,.12), transparent 70%); }

  .icon-card:hover { border-color: rgba(255,255,255,.2); }
  .cat-spells  .icon-card:hover { border-color: rgba(144,96,208,.5); }
  .cat-armor   .icon-card:hover { border-color: rgba(64,144,224,.5); }
  .cat-weapons .icon-card:hover { border-color: rgba(192,64,64,.5); }

  .icon-img {
    width: 60px; height: 60px;
    object-fit: contain;
    border-radius: 6px;
    transition: transform .15s;
    image-rendering: auto;
  }
  .icon-card:hover .icon-img { transform: scale(1.1); }

  .icon-idx {
    font-size: 10px; font-weight: 600;
    color: var(--t3); letter-spacing: .02em;
    font-variant-numeric: tabular-nums;
  }
  .cat-spells  .icon-idx { color: rgba(144,96,208,.7); }
  .cat-armor   .icon-idx { color: rgba(64,144,224,.7); }
  .cat-weapons .icon-idx { color: rgba(192,64,64,.7); }

  /* ── DETAIL PANEL ── */
  #detail {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(14,14,20,.95); backdrop-filter: blur(16px);
    border: 1px solid rgba(212,168,68,.3);
    border-radius: 14px; padding: 14px 20px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(212,168,68,.1);
    min-width: 320px; max-width: 600px;
    transition: all .2s; opacity: 0; pointer-events: none;
    z-index: 200;
  }
  #detail.visible { opacity: 1; pointer-events: auto; }
  #detail-img { width: 64px; height: 64px; object-fit: contain; border-radius: 8px; flex-shrink: 0; }
  #detail-info { flex: 1; }
  #detail-idx { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: .1em; }
  #detail-url { font-size: 10px; color: var(--t3); word-break: break-all; margin-top: 3px; line-height: 1.4; }
  #copy-btn {
    background: rgba(212,168,68,.15); border: 1px solid rgba(212,168,68,.3);
    color: var(--gold); border-radius: 8px; padding: 8px 14px;
    font-family: 'Exo 2', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: all .15s; flex-shrink: 0;
  }
  #copy-btn:hover { background: rgba(212,168,68,.25); }
  #copy-btn.copied { background: rgba(64,176,96,.2); border-color: rgba(64,176,96,.4); color: #60d080; }
  #close-detail {
    background: none; border: none; color: var(--t3); cursor: pointer;
    font-size: 18px; padding: 4px; line-height: 1; transition: color .15s;
    flex-shrink: 0;
  }
  #close-detail:hover { color: var(--tx); }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 80px 20px; color: var(--t3); }
  .empty svg { opacity: .2; margin-bottom: 16px; }
  .empty p { font-size: 14px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

  /* ── CATEGORY LABEL ── */
  .cat-label {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .12em;
    padding: 6px 0 12px; color: var(--t3); text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
  }
  .cat-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
</head>

<header>

      </svg>
      <input id="search" type="text" placeholder="Index-Nr. oder Suche…">
    </div>
  </div>
</header>

<div class="stats-bar" id="stats-bar">

<main>

    <div id="detail-url"></div>
  </div>
  <button id="copy-btn">URL kopieren</button>
  <button id="close-detail">✕</button>
</div>

const CATS = {
  spells:  { urls: SPELL_URLS,  label: 'Zauber-Icons',  count: SPELL_URLS.length },
  armor:   { urls: ARMOR_URLS,  label: 'Rüstungs-Icons', count: ARMOR_URLS.length },
  weapons: { urls: WEAPON_URLS, label: 'Waffen-Icons',  count: WEAPON_URLS.length },
};

let currentCat = 'spells';
let selectedIdx = null;

function renderGrid(cat, filter='') {
  const data = CATS[cat];
  const container = document.getElementById('grid-container');
  container.className = `grid cat-${cat}`;

  const filt = filter.trim().toLowerCase();
  let shown = 0;

  // Virtual render with IntersectionObserver for performance
  let html = '';
  data.urls.forEach((url, i) => {
    const idxStr = String(i);
    if (filt && !idxStr.includes(filt)) return;
    shown++;
    html += `<div class="icon-card${selectedIdx===i?' selected':''}" data-idx="${i}" data-url="${url}" title="Index ${i}">
      <img class="icon-img" loading="lazy" src="${url}" alt="Icon ${i}">
      <div class="icon-idx">#${i}</div>
    </div>`;
  });

  if (!shown) {
    container.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Keine Icons für „${filt}" gefunden</p></div>`;
  } else {
    container.innerHTML = html;
    // Click handlers
    container.querySelectorAll('.icon-card').forEach(card => {
      card.addEventListener('click', () => selectIcon(parseInt(card.dataset.idx), card.dataset.url, cat));
    });
  }

  document.getElementById('stat-shown').textContent = shown;
  document.getElementById('stat-total').textContent = data.count;
}

function selectIcon(idx, url, cat) {
  selectedIdx = idx;
  // Update selected state
  document.querySelectorAll('.icon-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[data-idx="${idx}"]`)?.classList.add('selected');

  // Show detail panel
  document.getElementById('detail-img').src = url;
  document.getElementById('detail-idx').textContent = `${CATS[cat].label.toUpperCase()} · INDEX #${idx}`;
  document.getElementById('detail-url').textContent = url;
  document.getElementById('detail').classList.add('visible');
  document.getElementById('copy-btn').textContent = 'URL kopieren';
  document.getElementById('copy-btn').classList.remove('copied');
}

// Tabs
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentCat = tab.dataset.cat;
  selectedIdx = null;
  document.getElementById('detail').classList.remove('visible');
  document.getElementById('search').value = '';
  renderGrid(currentCat);
});

// Search
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderGrid(currentCat, e.target.value), 120);
});

// Copy URL
document.getElementById('copy-btn').addEventListener('click', () => {
  const url = document.getElementById('detail-url').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Kopiert!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'URL kopieren'; btn.classList.remove('copied'); }, 2000);
  });
});

// Close detail
document.getElementById('close-detail').addEventListener('click', () => {
  document.getElementById('detail').classList.remove('visible');
  document.querySelectorAll('.icon-card').forEach(c => c.classList.remove('selected'));
  selectedIdx = null;
});

// Init
renderGrid('spells');
</script>
